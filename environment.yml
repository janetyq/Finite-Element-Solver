# Conda environment for the Finite Element Solver.
# Recreate with:  conda env create -f environment.yml
# Then activate:  conda activate fem
#
# tetgen and svg.path are not on conda-forge, so they are installed via pip.

name: fem
channels:
  - conda-forge
dependencies:
  - python=3.11
  # core solver
  - numpy=2.4.6
  - scipy=1.17.1
  - matplotlib=3.11.0
  # optional: 3D tetrahedral meshing
  - pyvista=0.48.4
  # testing
  - pytest=9.1.1
  # pip-only packages
  - pip
  - pip:
      - tetgen==0.8.4
      - svg.path==7.1
