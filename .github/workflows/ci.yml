name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install the pinned Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check

      - name: Type check (pyright)
        run: uv run pyright

      - name: Test (pytest)
        run: uv run pytest
